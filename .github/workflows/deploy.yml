name: Publish to NPM

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    environment: deploy
    if: github.repository == 'ton-org/sandbox'

    permissions:
      contents: read
      id-token: write # required for npm provenance when publishing with trusted publishing.

    steps:
      - name: Fetch Sources
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Check package version
        # language=Bash
        run: |
          package_version="$(jq -r .version package.json)"
          tag_version="${GITHUB_REF_NAME#v}"

          if [ "$tag_version" != "$package_version" ]; then
            echo "::error title=Version mismatch::package.json(version) '${package_version}' does not match tag '${tag_version}'"
            exit 1
          fi

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Install dependencies
        run: yarn install --immutable --check-cache --check-resolutions

      - name: Build
        run: yarn run build

      - name: Publish
        run: npm publish --access public

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish
    if: github.repository == 'ton-org/sandbox'

    permissions:
      contents: write # required to create the GitHub Release for the published tag.

    steps:
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        # language=Bash
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            --verify-tag
