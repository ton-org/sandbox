on:
  push:
    branches:
      - main
name: Publish to NPM
jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    environment: prod
    if: github.repository == 'ton-org/sandbox'
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'
      - name: Install Yarn
        run: npm install -g yarn
      - name: Install dependencies
        run: yarn
      - name: Run tests
        run: yarn test
      - name: Build
        run: yarn build
      - name: Publish
        run: npm publish --provenance --access public
